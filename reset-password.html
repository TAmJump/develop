<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>パスワード再設定 | TAmJ 不動産開発サイト</title>
  <link rel="stylesheet" href="css/base.css">
  <style>
    .auth-section {
      min-height: 80vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
    }
    .auth-box {
      width: 100%;
      max-width: 480px;
    }
    .auth-label {
      font-size: 11px;
      letter-spacing: .15em;
      color: #999;
      margin-bottom: 12px;
    }
    .auth-title {
      font-size: 28px;
      font-weight: 300;
      margin-bottom: 40px;
    }
    .form-group {
      margin-bottom: 24px;
    }
    .form-group label {
      display: block;
      font-size: 13px;
      color: #555;
      margin-bottom: 8px;
    }
    .form-group input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 15px;
      box-sizing: border-box;
      outline: none;
      transition: border-color .2s;
    }
    .form-group input:focus {
      border-color: #111;
    }
    .btn-primary {
      width: 100%;
      padding: 14px;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .2s;
    }
    .btn-primary:hover { opacity: .8; }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
    .msg {
      margin-top: 20px;
      padding: 12px 16px;
      border-radius: 6px;
      font-size: 13px;
      display: none;
    }
    .msg.success { background: #f0fdf4; color: #16a34a; display: block; }
    .msg.error   { background: #fef2f2; color: #dc2626; display: block; }
    .back-link {
      display: block;
      text-align: center;
      margin-top: 24px;
      font-size: 13px;
      color: #666;
      text-decoration: none;
    }
    .back-link:hover { color: #111; }

    /* リクエスト画面 */
    #request-form { display: block; }
    /* 確認画面（トークンあり） */
    #confirm-form { display: none; }
  </style>
</head>
<body>
  <nav style="padding:20px 40px;border-bottom:1px solid #eee;display:flex;align-items:center;gap:40px">
    <a href="index.html" style="display:flex;align-items:center">
      <img src="img/logo.svg" alt="TAmJ" style="height:32px" onerror="this.style.display='none'">
    </a>
    <div style="margin-left:auto;display:flex;gap:32px">
      <a href="index.html" style="font-size:13px;letter-spacing:.1em;text-decoration:none;color:#333">TOP</a>
      <a href="pricing.html" style="font-size:13px;letter-spacing:.1em;text-decoration:none;color:#333">PRICING</a>
      <a href="login.html" style="font-size:13px;letter-spacing:.1em;text-decoration:none;color:#333">LOGIN</a>
    </div>
  </nav>

  <section class="auth-section">
    <div class="auth-box">

      <!-- ① メールアドレス入力画面（トークンなし） -->
      <div id="request-form">
        <p class="auth-label">PASSWORD RESET</p>
        <h1 class="auth-title">パスワードの再設定</h1>
        <p style="font-size:14px;color:#666;margin-bottom:32px;line-height:1.8">
          登録済みのメールアドレスを入力してください。<br>
          パスワード再設定用のリンクをお送りします。
        </p>

        <div class="form-group">
          <label>メールアドレス</label>
          <input type="email" id="req-email" placeholder="example@email.com">
        </div>

        <button class="btn-primary" id="req-btn" onclick="sendResetEmail()">リセットメールを送信</button>
        <div class="msg" id="req-msg"></div>
        <a href="login.html" class="back-link">← ログインに戻る</a>
      </div>

      <!-- ② 新しいパスワード入力画面（トークンあり） -->
      <div id="confirm-form">
        <p class="auth-label">PASSWORD RESET</p>
        <h1 class="auth-title">新しいパスワードの設定</h1>
        <p style="font-size:14px;color:#666;margin-bottom:32px;line-height:1.8">
          新しいパスワードを入力してください。
        </p>

        <div class="form-group">
          <label>新しいパスワード（8文字以上）</label>
          <input type="password" id="new-password" placeholder="新しいパスワード">
        </div>
        <div class="form-group">
          <label>新しいパスワード（確認）</label>
          <input type="password" id="new-password2" placeholder="もう一度入力">
        </div>

        <button class="btn-primary" id="confirm-btn" onclick="confirmReset()">パスワードを変更する</button>
        <div class="msg" id="confirm-msg"></div>
        <a href="login.html" class="back-link">← ログインに戻る</a>
      </div>

    </div>
  </section>

  <script>
    const API = 'https://tamjump-member-api.animalb001.workers.dev';

    // URLのtokenを確認して画面切り替え
    const token = new URLSearchParams(location.search).get('token');
    if (token) {
      document.getElementById('request-form').style.display = 'none';
      document.getElementById('confirm-form').style.display = 'block';
    }

    // ① メール送信
    async function sendResetEmail() {
      const email = document.getElementById('req-email').value.trim();
      const msg   = document.getElementById('req-msg');
      const btn   = document.getElementById('req-btn');

      msg.className = 'msg';
      msg.textContent = '';

      if (!email) {
        msg.className = 'msg error';
        msg.textContent = 'メールアドレスを入力してください。';
        return;
      }

      btn.disabled = true;
      btn.textContent = '送信中...';

      try {
        const res  = await fetch(`${API}/api/auth/reset-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email }),
        });
        const data = await res.json();

        if (data.ok) {
          msg.className = 'msg success';
          msg.textContent = data.message;
          btn.textContent = '送信完了';
        } else {
          msg.className = 'msg error';
          msg.textContent = data.error || '送信に失敗しました。';
          btn.disabled = false;
          btn.textContent = 'リセットメールを送信';
        }
      } catch (e) {
        msg.className = 'msg error';
        msg.textContent = '通信エラーが発生しました。';
        btn.disabled = false;
        btn.textContent = 'リセットメールを送信';
      }
    }

    // ② パスワード変更
    async function confirmReset() {
      const password  = document.getElementById('new-password').value;
      const password2 = document.getElementById('new-password2').value;
      const msg = document.getElementById('confirm-msg');
      const btn = document.getElementById('confirm-btn');

      msg.className = 'msg';
      msg.textContent = '';

      if (!password || !password2) {
        msg.className = 'msg error';
        msg.textContent = 'パスワードを入力してください。';
        return;
      }
      if (password.length < 8) {
        msg.className = 'msg error';
        msg.textContent = 'パスワードは8文字以上にしてください。';
        return;
      }
      if (password !== password2) {
        msg.className = 'msg error';
        msg.textContent = 'パスワードが一致しません。';
        return;
      }

      btn.disabled = true;
      btn.textContent = '変更中...';

      try {
        const res  = await fetch(`${API}/api/auth/reset-password/confirm`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password }),
        });
        const data = await res.json();

        if (data.ok) {
          msg.className = 'msg success';
          msg.textContent = data.message;
          btn.textContent = '変更完了';
          // 2秒後にログインページへ
          setTimeout(() => { location.href = 'login.html'; }, 2000);
        } else {
          msg.className = 'msg error';
          msg.textContent = data.error || 'パスワード変更に失敗しました。';
          btn.disabled = false;
          btn.textContent = 'パスワードを変更する';
        }
      } catch (e) {
        msg.className = 'msg error';
        msg.textContent = '通信エラーが発生しました。';
        btn.disabled = false;
        btn.textContent = 'パスワードを変更する';
      }
    }
  </script>
</body>
</html>
