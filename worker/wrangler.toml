name = "develop-api"
main = "worker.js"
compatibility_date = "2025-06-01"

# deploy 時に develop-api.tamjump.com を自動作成（DNS手動設定 不要）
routes = [
  { pattern = "develop-api.tamjump.com", custom_domain = true }
]

[vars]
FROM_EMAIL = "TAmJ不動産開発 <noreply@tamjump.com>"
SITE_URL = "https://develop.tamjump.com"

# D1（必須）── JIN作業: `npx wrangler d1 create develop` で出た database_id を下に貼る
[[d1_databases]]
binding = "DB"
database_name = "develop"
database_id = "77a77eb2-6e96-412a-940d-221c56a4ab23"
